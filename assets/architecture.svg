<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="sup" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="res" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#059669"/></linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="620" rx="20" fill="url(#abg)"/>
  <text x="40" y="52" fill="#f8fafc" font-size="29" font-weight="700">Three-Level Nested StateGraph</text>
  <text x="40" y="80" fill="#94a3b8" font-size="16">Main graph → supervisor subgraph → parallel researcher subgraphs</text>

  <!-- Main graph row -->
  <g font-size="14.5" font-weight="600" text-anchor="middle">
    <rect x="40" y="108" width="120" height="44" rx="10" fill="url(#node)"/><text x="100" y="135" fill="#fff">clarify_with_user</text>
    <rect x="196" y="108" width="140" height="44" rx="10" fill="url(#node)"/><text x="266" y="135" fill="#fff">write_research_brief</text>
    <rect x="372" y="108" width="150" height="44" rx="10" fill="url(#sup)"/><text x="447" y="129" fill="#fff" font-size="13.5">research_supervisor</text><text x="447" y="145" fill="#ddd6fe" font-size="11">(subgraph)</text>
    <rect x="560" y="108" width="160" height="44" rx="10" fill="url(#node)"/><text x="640" y="129" fill="#fff" font-size="13">final_report_generation</text><text x="640" y="144" fill="#bfdbfe" font-size="10.5">retry on token limit</text>
  </g>
  <g stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)">
    <line x1="160" y1="130" x2="190" y2="130"/>
    <line x1="336" y1="130" x2="366" y2="130"/>
    <line x1="522" y1="130" x2="554" y2="130"/>
  </g>
  <text x="760" y="135" fill="#64748b" font-size="13">→ END</text>

  <!-- Supervisor subgraph container -->
  <rect x="40" y="184" width="800" height="150" rx="16" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="60" y="210" fill="#c4b5fd" font-size="15" font-weight="700">Supervisor Subgraph</text>
  <g font-size="14" font-weight="600" text-anchor="middle">
    <rect x="120" y="232" width="150" height="44" rx="10" fill="url(#sup)"/><text x="195" y="259" fill="#fff">supervisor</text>
    <rect x="350" y="232" width="160" height="44" rx="10" fill="url(#sup)"/><text x="430" y="259" fill="#fff">supervisor_tools</text>
  </g>
  <g stroke="#c4b5fd" stroke-width="2" marker-end="url(#arr)" fill="none">
    <line x1="270" y1="248" x2="346" y2="248"/>
    <path d="M350,266 C310,300 230,300 195,280"/>
  </g>
  <text x="300" y="316" fill="#94a3b8" font-size="12" text-anchor="middle">loop until ResearchComplete</text>
  <text x="560" y="245" fill="#c4b5fd" font-size="12.5">ConductResearch · think_tool</text>
  <text x="560" y="263" fill="#64748b" font-size="12">spawns researchers in parallel ↓</text>

  <!-- Researcher subgraphs container -->
  <rect x="40" y="358" width="800" height="210" rx="16" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="60" y="384" fill="#6ee7b7" font-size="15" font-weight="700">Researcher Subgraphs — parallel ×N <tspan fill="#f87171" font-size="12.5" font-weight="600">(asyncio.gather, no timeout)</tspan></text>

  <!-- three parallel researcher pipelines -->
  <g font-size="12.5" font-weight="600" text-anchor="middle">
    <!-- pipeline 1 -->
    <rect x="70" y="404" width="110" height="38" rx="9" fill="url(#res)"/><text x="125" y="428" fill="#fff">researcher</text>
    <rect x="210" y="404" width="120" height="38" rx="9" fill="url(#res)"/><text x="270" y="428" fill="#fff">researcher_tools</text>
    <rect x="360" y="404" width="130" height="38" rx="9" fill="url(#res)"/><text x="425" y="428" fill="#fff">compress_research</text>

    <!-- pipeline 2 -->
    <rect x="70" y="458" width="110" height="38" rx="9" fill="url(#res)" opacity="0.85"/><text x="125" y="482" fill="#fff">researcher</text>
    <rect x="210" y="458" width="120" height="38" rx="9" fill="url(#res)" opacity="0.85"/><text x="270" y="482" fill="#fff">researcher_tools</text>
    <rect x="360" y="458" width="130" height="38" rx="9" fill="url(#res)" opacity="0.85"/><text x="425" y="482" fill="#fff">compress_research</text>

    <!-- pipeline 3 (faded) -->
    <rect x="70" y="512" width="110" height="38" rx="9" fill="url(#res)" opacity="0.6"/><text x="125" y="536" fill="#fff">researcher</text>
    <rect x="210" y="512" width="120" height="38" rx="9" fill="url(#res)" opacity="0.6"/><text x="270" y="536" fill="#fff">researcher_tools</text>
    <rect x="360" y="512" width="130" height="38" rx="9" fill="url(#res)" opacity="0.6"/><text x="425" y="536" fill="#fff">compress_research</text>
  </g>
  <g stroke="#6ee7b7" stroke-width="1.8" marker-end="url(#arr)">
    <line x1="180" y1="423" x2="206" y2="423"/><line x1="330" y1="423" x2="356" y2="423"/>
    <line x1="180" y1="477" x2="206" y2="477"/><line x1="330" y1="477" x2="356" y2="477"/>
    <line x1="180" y1="531" x2="206" y2="531"/><line x1="330" y1="531" x2="356" y2="531"/>
  </g>
  <text x="640" y="478" fill="#6ee7b7" font-size="12.5" text-anchor="middle">each runs search +<tspan x="640" dy="16">think_tool, then</tspan><tspan x="640" dy="16">compresses notes</tspan></text>

  <text x="40" y="600" fill="#64748b" font-size="13">Clean decomposition — but the fan-out has no per-task timeout, and errors at any level return quietly.</text>
</svg>
